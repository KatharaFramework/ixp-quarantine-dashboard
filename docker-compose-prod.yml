services:
  backend:
    build: ./services/backend
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../ixp-digital-twin:/app/src/digital_twin
    environment:
      - "ORIGIN=http://public.domain.quarantine.ui"
      - "ENVIRONMENT=prod"
    command: bash -c "cd src && uvicorn main:app --host 0.0.0.0 --port 8000"
    uts: host
    networks:
      - my_network
  reverse-proxy:
    build:
      context: ./services/
      dockerfile: Dockerfile
    networks:
      - my_network
    ports:
      - "80:80"
      - "443:443"
    environment:
      - "ENABLE_HTTPS=1"
      - "BASIC_USERNAME=username"
      - "BASIC_PASSWORD=password"
      - "FORWARD_HOST=localhost"
      - "FORWARD_PORT=5173"
      - "FORWARD_PORT_API=8000"
      - "PUBLIC_DOMAIN=public.domain.quarantine.ui"
    depends_on:
      - backend
networks:
  my_network:
    driver: bridge
